MaintainerNotes:
  This is the free (open source) build. The pro module at privacify_pro/ is not
  included in this repository. Free builds detect pro availability at runtime
  via ProFeature.isAutoGuardAvailable() and gate Pro features behind a dialog.
  Build with: ./gradlew :app:assembleRelease
  APK output: app/build/outputs/apk/release/app-release-unsigned.apk
